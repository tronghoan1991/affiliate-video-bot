services:
  - type: web
    name: affiliate-studio-v8
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    healthCheckPath: /ping
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: ALLOWED_USER_IDS
        sync: false
      - key: RENDER_URL
        sync: false
      - key: RENDER_DEPLOY_HOOK
        sync: false
      - key: COLAB_SECRET
        value: affiliatestudio_v8_secret
      - key: PIXABAY_API_KEY
        sync: false
      - key: FREESOUND_API_KEY
        sync: false
      - key: NGROK_AUTH_TOKEN
        sync: false
      - key: PORT
        value: "5000"
