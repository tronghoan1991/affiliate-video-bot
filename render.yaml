# ══════════════════════════════════════════════════════════════════════════════
# render.yaml — Render Web Services config
# Deploy: https://render.com → New → Blueprint
# ══════════════════════════════════════════════════════════════════════════════

services:
  - type: web
    name: affiliate-video-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free          # Free tier: sleep sau 15 phút idle → dùng Cron-job ping
    region: singapore   # Gần Vietnam nhất
    branch: main

    # Health check endpoint cho Render
    healthCheckPath: /ping

    # Environment variables — điền trong Render Dashboard
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false     # Nhập tay trong Render Dashboard (bảo mật)

      - key: PIXABAY_API_KEY
        sync: false

      - key: VIDEO_ENGINE
        value: auto

      - key: RENDER_URL
        sync: false     # URL của service này, ví dụ: https://affiliate-video-bot.onrender.com
