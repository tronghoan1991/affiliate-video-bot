services:
  - type: web
    name: affiliate-bot-dispatcher
    runtime: docker
    plan: free
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: PORT
        value: 10000

      # ── Điền qua Render Dashboard → Environment ─────────────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false           # Bí mật — nhập tay trên Render

      - key: COLAB_NOTEBOOK_URL
        sync: false           # URL Google Colab notebook của bạn

      - key: ALLOWED_USER_IDS
        sync: false           # Telegram User ID (vd: 123456789)
