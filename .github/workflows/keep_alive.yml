name: Keep Render Alive

on:
  schedule:
    # Ping every 10 minutes (GitHub Actions limit: 5 min minimum)
    - cron: "*/10 * * * *"
  workflow_dispatch:   # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Render
        run: |
          RENDER_URL="${{ secrets.RENDER_URL }}"
          echo "🔄 Pinging ${RENDER_URL}/ping ..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 20 "${RENDER_URL}/ping")
          echo "Status: ${STATUS}"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️  Render not healthy (status ${STATUS})"
            exit 1
          fi
          echo "✅ Render alive"

      - name: Wake Colab (if URL set)
        if: ${{ secrets.COLAB_URL != '' }}
        run: |
          COLAB_URL="${{ secrets.COLAB_URL }}"
          echo "🔄 Pinging Colab ${COLAB_URL}/ping ..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 20 "${COLAB_URL}/ping" || echo "000")
          echo "Colab status: ${STATUS}"
